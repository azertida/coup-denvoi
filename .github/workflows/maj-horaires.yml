name: Maj horaires

on:
  schedule:
    - cron: "17 6 * * *"    # 06:17 UTC (~08:17 Bruxelles)
    - cron: "28 14 * * *"   # 14:28 UTC (~16:28 Bruxelles)
  workflow_dispatch:        # déclenchement manuel depuis l'onglet Actions

permissions:
  contents: write

concurrency:
  group: maj-horaires
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Installer les dépendances Python
        run: pip install beautifulsoup4 lxml

      - name: Collecte des horaires
        run: python build_data.py

      - name: Commit si changement
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add matches.json
          if git diff --staged --quiet; then
            echo "Aucun changement."
          else
            git commit -m "data: maj horaires $(date -u +%FT%TZ)"
            git push
          fi
